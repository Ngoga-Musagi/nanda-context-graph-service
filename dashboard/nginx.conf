server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the query service
    location /api/ {
        proxy_pass http://ncg-api:7201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /federation/ {
        proxy_pass http://ncg-api:7201;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://ncg-api:7201;
    }
}
