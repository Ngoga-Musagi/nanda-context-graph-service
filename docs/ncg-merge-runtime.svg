<svg viewBox="0 0 1180 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2f6db3"/>
    </marker>
    <marker id="ahg" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#8aa6c8"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a3c6e" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="ncg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f4f86"/><stop offset="1" stop-color="#163d6c"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="700" fill="none"/>

  <!-- ===== NANDA-INDEX (registry) ===== -->
  <g filter="url(#sh)"><rect x="80" y="24" width="330" height="86" rx="14" fill="#ffffff" stroke="#8aa6c8" stroke-width="1.6" stroke-dasharray="7 5"/></g>
  <text x="116" y="62" font-size="21" font-weight="700" fill="#1a3c6e">nanda-index</text>
  <rect x="300" y="44" width="78" height="26" rx="13" fill="#eaf1fa" stroke="#d2e0f1"/>
  <text x="339" y="62" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1a3c6e" font-family="'SFMono-Regular',Consolas,Menlo,monospace">:6900</text>
  <text x="116" y="88" font-size="14.5" fill="#5b6b80">registry / phone book</text>

  <!-- discovery connector: index -> right -> down (the ┐) -->
  <path d="M410 67 L1095 67 L1095 200" fill="none" stroke="#8aa6c8" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#ahg)"/>
  <text x="752" y="58" text-anchor="middle" font-size="13.5" fill="#5b6b80">discovery &#183; unchanged API</text>

  <!-- register up-arrow: broker -> index -->
  <line x1="240" y1="196" x2="240" y2="114" stroke="#1a3c6e" stroke-width="2.2" marker-end="url(#ahg)"/>
  <text x="258" y="158" font-size="13.5" fill="#1a3c6e" font-weight="600">register</text>
  <text x="258" y="176" font-size="12.5" fill="#5b6b80">(+ optional trace sub-doc)</text>

  <!-- ===== AGENT CARDS ===== -->
  <g filter="url(#sh)"><rect x="70" y="200" width="300" height="118" rx="16" fill="#ffffff" stroke="#2f6db3" stroke-width="1.6"/></g>
  <rect x="70" y="200" width="300" height="6" rx="3" fill="#1a3c6e"/>
  <text x="220" y="242" text-anchor="middle" font-size="23" font-weight="700" fill="#1a3c6e">broker</text>
  <text x="220" y="265" text-anchor="middle" font-size="14" fill="#5b6b80">adapter</text>
  <rect x="158" y="278" width="124" height="28" rx="14" fill="#eaf1fa" stroke="#d2e0f1"/>
  <text x="220" y="297" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3c6e" font-family="'SFMono-Regular',Consolas,Menlo,monospace">:6000</text>

  <g filter="url(#sh)"><rect x="440" y="200" width="300" height="118" rx="16" fill="#ffffff" stroke="#2f6db3" stroke-width="1.6"/></g>
  <rect x="440" y="200" width="300" height="6" rx="3" fill="#2f6db3"/>
  <text x="590" y="242" text-anchor="middle" font-size="23" font-weight="700" fill="#1a3c6e">pricing</text>
  <text x="590" y="265" text-anchor="middle" font-size="14" fill="#5b6b80">NEST</text>
  <rect x="528" y="278" width="124" height="28" rx="14" fill="#eaf1fa" stroke="#d2e0f1"/>
  <text x="590" y="297" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3c6e" font-family="'SFMono-Regular',Consolas,Menlo,monospace">:6100</text>

  <g filter="url(#sh)"><rect x="810" y="200" width="300" height="118" rx="16" fill="#ffffff" stroke="#2f6db3" stroke-width="1.6"/></g>
  <rect x="810" y="200" width="300" height="6" rx="3" fill="#5a93cf"/>
  <text x="960" y="242" text-anchor="middle" font-size="23" font-weight="700" fill="#1a3c6e">approval</text>
  <text x="960" y="265" text-anchor="middle" font-size="14" fill="#5b6b80">NEST</text>
  <rect x="898" y="278" width="124" height="28" rx="14" fill="#eaf1fa" stroke="#d2e0f1"/>
  <text x="960" y="297" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3c6e" font-family="'SFMono-Regular',Consolas,Menlo,monospace">:6200</text>

  <!-- ===== A2A ARROWS ===== -->
  <line x1="372" y1="259" x2="436" y2="259" stroke="#2f6db3" stroke-width="2.4" marker-end="url(#ah)"/>
  <rect x="372" y="234" width="64" height="22" rx="11" fill="#2f6db3"/>
  <text x="404" y="250" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff" letter-spacing="0.5">A2A</text>

  <line x1="742" y1="259" x2="806" y2="259" stroke="#2f6db3" stroke-width="2.4" marker-end="url(#ah)"/>
  <rect x="742" y="234" width="64" height="22" rx="11" fill="#2f6db3"/>
  <text x="774" y="250" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff" letter-spacing="0.5">A2A</text>

  <!-- ===== PER-CARD TRACE + HEADER CAPTIONS ===== -->
  <text x="220" y="344" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a3c6e" font-family="'SFMono-Regular',Consolas,Menlo,monospace">traced_call &#8594; trace#1</text>
  <text x="220" y="365" text-anchor="middle" font-size="13" fill="#5b6b80" font-family="'SFMono-Regular',Consolas,Menlo,monospace">x-parent-trace = #1</text>

  <text x="590" y="344" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2f6db3" font-family="'SFMono-Regular',Consolas,Menlo,monospace">process_message &#8594; trace#2</text>
  <text x="590" y="365" text-anchor="middle" font-size="13" fill="#5b6b80" font-family="'SFMono-Regular',Consolas,Menlo,monospace">x-parent-trace = #2</text>

  <text x="960" y="344" text-anchor="middle" font-size="14.5" font-weight="700" fill="#5a93cf" font-family="'SFMono-Regular',Consolas,Menlo,monospace">process_message &#8594; trace#3</text>
  <text x="960" y="365" text-anchor="middle" font-size="13" fill="#5b6b80" font-family="'SFMono-Regular',Consolas,Menlo,monospace">parent_trace_id = #2</text>

  <!-- ===== CONVERGING TRACE BUS ===== -->
  <line x1="220" y1="378" x2="220" y2="432" stroke="#9db8d8" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="590" y1="378" x2="590" y2="432" stroke="#9db8d8" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="960" y1="378" x2="960" y2="432" stroke="#9db8d8" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M220 432 L960 432" stroke="#2f6db3" stroke-width="2.4" fill="none"/>
  <line x1="590" y1="432" x2="590" y2="474" stroke="#2f6db3" stroke-width="2.4" marker-end="url(#ah)"/>

  <!-- ===== NCG / Neo4j BOX ===== -->
  <g filter="url(#sh)"><rect x="350" y="478" width="480" height="78" rx="16" fill="url(#ncg)"/></g>
  <g transform="translate(392,502)" fill="#dce7f4">
    <ellipse cx="16" cy="6" rx="16" ry="6"/>
    <path d="M0,6 L0,30 A16,6 0 0,0 32,30 L32,6" fill="#cbddf2"/>
    <ellipse cx="16" cy="30" rx="16" ry="6" fill="#dce7f4"/>
    <ellipse cx="16" cy="6" rx="16" ry="6" fill="#eef4fb"/>
  </g>
  <text x="448" y="512" font-size="17" font-weight="700" fill="#ffffff" font-family="'SFMono-Regular',Consolas,Menlo,monospace">POST /ingest/trace</text>
  <text x="448" y="536" font-size="14.5" fill="#cdddf1">:7200 &#8594; NCG / Neo4j</text>

  <!-- ===== RESULT STRIP ===== -->
  <g filter="url(#sh)"><rect x="240" y="584" width="700" height="48" rx="12" fill="#eef7f1" stroke="#bfe2cf"/></g>
  <rect x="240" y="584" width="6" height="48" rx="3" fill="#1d7a52"/>
  <circle cx="272" cy="608" r="13" fill="#1d7a52"/>
  <path d="M266 608 l4 4 l8 -9" stroke="#ffffff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="296" y="614" font-size="16" font-weight="700" fill="#14304f" font-family="'SFMono-Regular',Consolas,Menlo,monospace">chain(approval) = [approval, pricing, broker]</text>

  <!-- mapping caption -->
  <text x="590" y="662" text-anchor="middle" font-size="14" fill="#5b6b80">Each touched file maps to one arrow:</text>
  <text x="590" y="684" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3c6e">improver &#8594; headers &#8594; register &#8594; receive-trace</text>
</svg>
